        function Increment(){
            let startvalue = Number(prompt("Enter your Increment Number "))
            let contshow  = document.getElementById("incount")
             //isNaN() is a built-in JavaScript function that checks whether a value is NaN (Not-a-Number).
            if(isNaN(startvalue)){ alert("Enetr valid number this not a number")}

            setInterval(() =>{
                contshow.innerHTML  = startvalue
                startvalue++
            }, 500)
        }
          function  Decorement(){
             let startvalue = Number(prompt("Enter your Increment Number "))
            let contshow  = document.getElementById("Decount")
             if(isNaN(startvalue)){ alert("Enetr valid number this not a number")}
             setInterval(() =>{
                contshow.innerHTML  = startvalue
                startvalue--
            }, 500)
          }

        //   form Validation: Ek input box aur button banao. Agar input khali hai aur button dabaya, toh red color mein error dikhao: "Please enter your name".

          function Checkbtn(){
             let message = document.querySelector(".showmessage")
             let inputs = document.getElementById("input").value //Jab aap document.getElementById("input") likhte hain, toh JS ko pura input box milta hai. Empty check karne ke liye aapko uski .value nikalni hogi.
             if(inputs === ""){ 
                message.style.color="red"
                message.innerHTML = "Input are empity Please Enter your Name"
             }
          }
