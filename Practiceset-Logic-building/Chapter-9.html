        class Human{
            constructor(name){

            }
            introduce(){

            }
        }

        class Student extends Human{

                this.object = object
            }
            introduce(){ //  // 3. Method Overriding: यहाँ हम introduce() मेथड को बदल रहे हैं

        class getdata{
            constructor(real, imaginery){
                this._real = real
                this._imaginery = imaginery
            }

            get real(){
               return this._real
            }
            set real(value){
                if(typeof value !== "number"){
                    console.error("Error : real part number hai ");
                    return ;
                }
                this._real = value
            }

             get imaginery(){
            return this.imaginery
        }
        set imaginery(value){
            if(typeof value !== "number"){
                console.log("Error: Imaginery part of number ");
                return 
            }
            this._imaginery = value
        }
        display(){
            console.log(`${this._real} + ${this._imaginery}i`)
        }
