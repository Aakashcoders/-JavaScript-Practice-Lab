        // The Token Manager: You are developing a user authentication system, and you need to manage user authentication tokens. Implement a function named setAuthToken that takes an authentication token and sets it in localStorage with an expiration time.

        function setAuthToken(token, ttlIneMs){
            const nows = Date.now();
            
            const tokendata = {
                value : token,
                expiry : nows + ttlIneMs
            };

            localStorage.setItem("userToken", JSON.stringify(tokendata));

        };

        function getAutotoken(){
           const itemstr = localStorage.getItem("userToken");

           if(!itemstr) return null;
           const item = JSON.parse(itemstr);
           const nows = Date.now()

           if(nows > item.expiry){
            localStorage.removeItem("userToken");
            return null;
           }
           return item.value
        }

        setAuthToken("abc-123-token", 3600000);
        getAutotoken()
