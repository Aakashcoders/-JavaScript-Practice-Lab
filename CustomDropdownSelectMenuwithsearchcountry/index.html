<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Dropdown Select Menu with search Country </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;600&display=swap"
        rel="stylesheet">

</head>

<body>
    <div class="container">
        <div class="seleced_countrys">
            <span>Select Country </span>
            <i class="fa-solid fa-caret-down"></i>
        </div>
        <div class="list_search_conatiner">
            <div class="seacrh">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="search" id="c-search" placeholder="Search" spellcheck="true">
            </div>
            <ul class="c-list">
                <li class="list_items">1</li>
                <li class="list_items">2</li>
                <li class="list_items">3</li>
            </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
