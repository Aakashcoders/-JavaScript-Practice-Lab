<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text formatter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 class="heading">Text Formatter </h1>
        <textarea id="inputbox" cols="30" rows="10" placeholder="Enter Your Text...."></textarea>
        <div class="option">
            <input type="radio" name="format-option" id="upperacse">
            <label class="label" for="upperacse">Upper-Case</label>
            <input type="radio" name="format-option" id="lowercase">
            <label for="lowercase" class="label">Lower-Case</label>
            <input type="radio" name="format-option" id="capitalizeSentence">
            <label for="capitalizeSentence" class="label">Capitalize Sentence</label>
            <input type="radio" name="format-option" id="capitalizeWord">
            <label for="capitalizeWord" class="label">Capitalize Word</label>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
