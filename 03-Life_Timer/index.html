<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Timer</title>
    <link rel="stylesheet" href="style.css">
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> -->
</head>
<body>
    <div  class="container">
        <div id="initialShowdiv" class="containt">
            <h1>Kindly Enter Your Date Of Birth</h1>
        </div>
        <div id="AfterBtnclickShow" class="containt">
            <div class="center">
            <h1>How Much Life Journey Coverd,Till Now</h1>
            <div class="Time_content">
                <h2>
                    <div class="years">0</div>
                    Years
                </h2>
                <h2>
                    <div class="months">0</div>
                    Months
                </h2>
                <h2>
                    <div class="Days">0</div>
                    Days
                </h2>
                <h2>
                    <div class="Houre">0</div>
                    Houre
                </h2>
                <h2>
                    <div class="Minutes">0</div>
                    Minutes
                </h2>
                <h2>
                    <div class="Seconds">0</div>
                    Seconds
                </h2>
            </div>
        </div></div>
    </div>
    <div class="setting">
       <img src="./settings.png" alt="setting_icon" id="set_icon">
       <div class="set_dbirth hide">
        <input type="date"  id="db_input">
        <button id="db_btn">ADD DOB</button>
       </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
